version: "3.8"

services:
  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - DB_HOST=host.docker.internal
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: company-rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data: